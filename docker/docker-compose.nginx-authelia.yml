# Nginx + Authelia overlay — replaces docker-compose.nginx.yml when using Authelia.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.nginx-authelia.yml -f docker-compose.authelia.yml up -d
#
# Do NOT combine with docker-compose.nginx.yml.

services:

  kong:
    ports: !reset []
    environment:
      KONG_PORT_MAPS: "443:8000,443:8443"

  nginx:
    container_name: supabase-nginx
    image: jonasal/nginx-certbot:6.0.1-nginx1.29.5
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      kong:
        condition: service_healthy
      studio:
        condition: service_healthy
      authelia:
        condition: service_started
    environment:
      PROXY_DOMAIN: ${PROXY_DOMAIN}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
    command:
      - /bin/bash
      - -c
      - |
        envsubst '$${PROXY_DOMAIN}' < /etc/nginx/supabase-nginx-authelia.conf.tpl > /etc/nginx/user_conf.d/nginx.conf && \
        /scripts/start_nginx_certbot.sh
    volumes:
      - ./volumes/proxy/nginx/supabase-nginx-authelia.conf.tpl:/etc/nginx/supabase-nginx-authelia.conf.tpl:ro
      - ./volumes/nginx/snippets:/etc/nginx/snippets:ro
      - nginx_letsencrypt:/etc/letsencrypt

volumes:
  nginx_letsencrypt:
